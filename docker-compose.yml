services:
  agentops-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      AGENTOPS_APP_ENV: compose
      AGENTOPS_LIVE_CONNECTORS_ENABLED: "false"
      AGENTOPS_LIVE_PROVIDERS_ENABLED: "false"
      AGENTOPS_SECRET_MODE: reference_only
    volumes:
      - ./framework/backend/data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  agentops-site:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./site:/usr/share/nginx/html:ro
    depends_on:
      - agentops-api
