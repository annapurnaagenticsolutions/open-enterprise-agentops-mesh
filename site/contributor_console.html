<!doctype html><html><head><meta charset="utf-8"><title>Contributor Readiness</title><style>
body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#f7f8fb;color:#1f2937}.wrap{max-width:1120px;margin:0 auto;padding:32px}.hero{background:#111827;color:white;padding:32px;border-radius:20px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:22px}.card{background:white;border:1px solid #e5e7eb;border-radius:16px;padding:18px;box-shadow:0 8px 20px rgba(15,23,42,.06)}.tag{display:inline-block;background:#eef2ff;color:#3730a3;border-radius:999px;padding:4px 10px;font-size:12px;margin:3px}table{border-collapse:collapse;width:100%;background:white;border-radius:14px;overflow:hidden}td,th{border:1px solid #e5e7eb;padding:10px;text-align:left}a{color:#2563eb}.good{color:#047857;font-weight:bold}.warn{color:#b45309;font-weight:bold}code{background:#eef2f7;padding:2px 5px;border-radius:5px}</style></head><body><div class="wrap"><div class="hero"><h1>Contributor Readiness Console</h1><p>v2.1 public adoption and contribution readiness view.</p></div><div class="grid"><div class="card"><h2>Decision</h2><p id="decision"></p></div><div class="card"><h2>Required before announcement</h2><ul id="required"></ul></div><div class="card"><h2>Good first contributions</h2><ul id="good"></ul></div><div class="card"><h2>Blocked contribution types</h2><ul id="blocked"></ul></div></div><h2>Scores</h2><table id="scores"></table></div><script>
fetch('data/contributor_readiness.json').then(r=>r.json()).then(data=>{
 document.getElementById('decision').innerHTML='<span class="good">'+data.decision+'</span>';
 document.getElementById('required').innerHTML=data.required_before_public_announcement.map(x=>'<li>'+x+'</li>').join('');
 document.getElementById('good').innerHTML=data.good_first_contributions.map(x=>'<li>'+x+'</li>').join('');
 document.getElementById('blocked').innerHTML=data.blocked_contribution_types.map(x=>'<li>'+x+'</li>').join('');
 document.getElementById('scores').innerHTML='<tr><th>Dimension</th><th>Score</th></tr>'+Object.entries(data.scores).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
});
</script></body></html>
